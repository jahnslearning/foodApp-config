# Gateway Server Port
server.port=8081
spring.application.name=api-gateway

spring.cloud.gateway.httpclient.connect-timeout=2000
spring.cloud.gateway.httpclient.response-timeout=5s

resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.timelimiter.configs.default.timeoutDuration=3s

# --- ROUTE 0: USER SERVICE ---
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/users/**,/user-service/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=userServiceCB
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/user-service
# Add this filter to remove "/order-service" before sending to the microservice

# --- ROUTE 1: ITEM SERVICE ---
spring.cloud.gateway.routes[1].id=item-service
spring.cloud.gateway.routes[1].uri=lb://item-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/item/**,/category/**,restaurant/**,/item-service/**
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=itemServiceCB
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/item-service
# Add this filter to remove "/order-service" before sending to the microservice

# --- ROUTE 2: ORDER SERVICE ---
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/cart/**,/orders/**,/bills/**,/order-service/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=orderServiceCB
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/order-service
# Add this filter to remove "/order-service" before sending to the microservice

# How long to wait before trying the service again (in milliseconds)
resilience4j.circuitbreaker.instances.userServiceCB.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.itemServiceCB.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.orderServiceCB.wait-duration-in-open-state=5s

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
