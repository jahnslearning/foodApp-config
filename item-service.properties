spring.application.name=item-service
server.port=8083
spring.jpa.hibernate.ddl-auto = update
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/itemdb
spring.datasource.username=jahns
spring.datasource.password=postgresql
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=INFO

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=item-inventory-group

# Deserialization settings
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Map the Order Service package to the Item Service package
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=project.OrderService.dto.OrderPlacedEvent:project.ItemService.dto.OrderPlacedEvent

spring.cloud.openfeign.circuitbreaker.enabled=true
